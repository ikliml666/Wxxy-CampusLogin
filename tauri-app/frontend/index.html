<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/32x32.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/128x128.png" />
    <title>校园网登录助手</title>
    <script>
      (function(){
        try{
          var lm=localStorage.getItem('campus-light-mode');
          if(lm==='1'){
            document.documentElement.setAttribute('data-light','1');
          } else {
            document.documentElement.classList.add('dark');
          }
          var th=localStorage.getItem('campus-theme');
          if(th&&th!=='default')document.documentElement.classList.add('theme-'+th);
        }catch(e){}
      })();
    </script>
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent: #3b82f6;
        --border: #1e293b;
        --sidebar-bg: rgba(15,23,42,0.7);
        --status-bar-bg: rgba(30,41,59,0.5);
        --content-bg: rgba(15,23,42,0.3);
        --hover-bg: rgba(255,255,255,0.05);
        --hover-bg-strong: rgba(255,255,255,0.08);
        --active-bg: rgba(59,130,246,0.12);
        --active-color: #60a5fa;
        --active-border: #3b82f6;
        --badge-bg: rgba(59,130,246,0.15);
        --badge-color: #60a5fa;
        --badge-border: rgba(59,130,246,0.25);
        --icon-accent-bg: rgba(59,130,246,0.12);
        --icon-accent-color: #60a5fa;
        --logo-from: #3b82f6;
        --logo-to: #60a5fa;
      }
      html[data-light] {
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --accent: #3b82f6;
        --border: #f1f5f9;
        --sidebar-bg: rgba(248,250,252,0.9);
        --status-bar-bg: rgba(248,250,252,0.5);
        --content-bg: rgba(248,250,252,0.3);
        --hover-bg: rgba(0,0,0,0.04);
        --hover-bg-strong: rgba(0,0,0,0.06);
        --active-bg: rgba(59,130,246,0.08);
        --active-color: #3b82f6;
        --active-border: #3b82f6;
        --badge-bg: rgba(59,130,246,0.08);
        --badge-color: #3b82f6;
        --badge-border: rgba(59,130,246,0.15);
        --icon-accent-bg: rgba(59,130,246,0.08);
        --icon-accent-color: #3b82f6;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); font-size: 14px; -webkit-font-smoothing: antialiased; }
      .sk { display: flex; flex-direction: column; height: 100vh; }
      .sk-tb { display: flex; align-items: center; justify-content: space-between; height: 40px; padding: 0 16px; background: var(--bg-secondary); }
      .sk-sb { display: flex; align-items: center; height: 32px; padding: 0 16px; background: var(--status-bar-bg); font-size: 12px; color: var(--text-secondary); }
      .sk-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: sk-pulse 1.5s ease-in-out infinite; margin-right: 6px; display: inline-block; }
      @keyframes sk-pulse { 0%,100%{opacity:1}50%{opacity:.4} }
      .sk-main { display: flex; flex: 1; min-height: 0; }
      .sk-side { width: 180px; background: var(--sidebar-bg); }
      .sk-content { flex: 1; padding: 20px; background: var(--content-bg); }
      .sk-card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
      .sk-line { background: var(--border); border-radius: 4px; height: 12px; margin-bottom: 8px; }
      .sk-log { width: 220px; background: var(--sidebar-bg); }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="sk">
        <div class="sk-tb"></div>
        <div class="sk-sb"><span class="sk-dot"></span>正在初始化...</div>
        <div class="sk-main">
          <div class="sk-side"></div>
          <div class="sk-content">
            <div class="sk-card"><div class="sk-line" style="width:80px"></div><div class="sk-line" style="width:120px"></div></div>
            <div class="sk-card"><div class="sk-line" style="width:100px"></div><div class="sk-line" style="width:140px"></div></div>
          </div>
          <div class="sk-log"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
